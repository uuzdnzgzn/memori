<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memori | QR Etkinlik Fotoğrafları</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f8fafc; 
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-top: 1px solid #e2e8f0; }
        
        @media print {
            header, nav, #admin-inputs, .no-print { display: none !important; }
            #view-admin { display: block !important; }
            .print-area { display: flex !important; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
            #qr-container { transform: scale(1.8); margin: 40px 0; }
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 antialiased pb-24">

    <!-- Mesaj Kutusu -->
    <div id="msg-box" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] hidden">
        <div class="bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl text-sm font-medium whitespace-nowrap" id="msg-text"></div>
    </div>

    <!-- Üst Header -->
    <header id="app-header" class="bg-indigo-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter italic cursor-pointer" onclick="location.href=location.pathname">MEMORI</h1>
            <div id="event-info" class="hidden text-xs font-semibold bg-white/20 px-3 py-1 rounded-full animate-pulse">
                Bağlanıyor...
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4 mt-4">

        <!-- 1. ADMİN PANELİ -->
        <section id="view-admin" class="hidden">
            <div id="admin-inputs" class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                <h2 class="text-2xl font-bold mb-2 text-slate-900">Etkinlik Başlat</h2>
                <p class="text-slate-500 mb-6 text-sm">Misafirleriniz için bir etkinlik odası oluşturun.</p>
                <input type="text" id="event-name" placeholder="Örn: Ahmet & Ayşe Düğün" class="w-full border-2 border-slate-200 px-4 py-4 rounded-2xl mb-4 focus:border-indigo-500 outline-none transition-all text-lg appearance-none">
                <button onclick="createNewEvent()" id="create-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transition-all active:scale-95">
                    Oluştur ve QR Üret
                </button>
            </div>

            <div id="qr-result-card" class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 hidden print-area">
                <h3 id="qr-event-title" class="text-3xl font-black text-center mb-8 text-indigo-600 uppercase">ETKİNLİK</h3>
                <div class="flex justify-center p-4 bg-white rounded-2xl border-2 border-slate-50">
                    <div id="qr-container"></div>
                </div>
                <div class="mt-10 flex flex-col gap-3 no-print">
                    <button onclick="window.print()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2">
                        Yazdır (A4)
                    </button>
                    <button id="view-gallery-btn" class="w-full bg-indigo-50 text-indigo-700 font-bold py-4 rounded-2xl">
                        Galeriyi Aç
                    </button>
                </div>
            </div>
        </section>

        <!-- 2. YÜKLEME EKRANI -->
        <section id="view-upload" class="hidden">
            <div id="upload-content">
                <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl text-center border border-indigo-50 relative overflow-hidden">
                    <div class="w-24 h-24 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6">
                        <svg class="w-12 h-12 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                    </div>
                    <h2 class="text-3xl font-black mb-2 text-slate-800">Fotoğraf At!</h2>
                    <p class="text-slate-500 mb-10 px-4">Çektiğin fotoğrafları hemen yükle.</p>
                    <input type="file" id="photo-input" accept="image/*" class="hidden" onchange="handleFileUpload(this)">
                    <label for="photo-input" class="block w-full bg-indigo-600 text-white font-black py-5 px-6 rounded-3xl shadow-xl active:scale-95 text-xl cursor-pointer">
                        ÇEK / SEÇ
                    </label>
                    <div id="upload-status" class="mt-8 hidden">
                        <div class="flex justify-between text-sm font-bold mb-2">
                            <span>Yükleniyor...</span>
                            <span id="pct">0%</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-3">
                            <div id="p-bar" class="bg-indigo-600 h-3 rounded-full transition-all" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div id="no-event-error" class="hidden text-center py-12 bg-white rounded-3xl border border-red-100 shadow-sm">
                <span class="text-5xl block mb-4">⚠️</span>
                <h3 class="text-xl font-bold">Oda Seçilmedi</h3>
                <p class="text-slate-500 mt-2 px-8 text-sm">Lütfen bir QR kod okutun veya yeni bir etkinlik başlatın.</p>
            </div>
        </section>

        <!-- 3. GALERİ -->
        <section id="view-gallery" class="hidden">
            <div id="gallery-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
            <div id="empty-state" class="text-center py-24 hidden">
                <h3 class="text-xl font-bold text-slate-400 italic">Henüz fotoğraf yok...</h3>
            </div>
        </section>

    </main>

    <!-- Navigasyon -->
    <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 glass-nav z-50">
        <div class="max-w-md mx-auto flex justify-around p-4">
            <button onclick="switchTab('upload')" id="nav-up" class="flex flex-col items-center gap-1 text-slate-400 font-bold transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                <span class="text-[10px] uppercase">Yükle</span>
            </button>
            <button onclick="switchTab('gallery')" id="nav-gal" class="flex flex-col items-center gap-1 text-slate-400 font-bold transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span class="text-[10px] uppercase">Galeri</span>
            </button>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Global Değişkenler
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'memori-a1a90';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBWx7CJhPb-rQSSr5yH4CG03Xyfb3OXZCU",
            authDomain: "memori-a1a90.firebaseapp.com",
            projectId: "memori-a1a90",
            storageBucket: "memori-a1a90.firebasestorage.app",
            messagingSenderId: "293887147348",
            appId: "1:293887147348:web:0bd0c17556aa876a22dcc1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const auth = getAuth(app);

        let user = null;
        let currentEventId = null;
        let unsub = null;

        // RULE 1: Zorunlu Dosya Yolları
        const getEvPath = () => `artifacts/${appId}/public/data/events`;
        const getPhPath = (id) => `artifacts/${appId}/public/data/events/${id}/photos`;

        function showMsg(text) {
            const b = document.getElementById('msg-box');
            document.getElementById('msg-text').innerText = text;
            b.classList.remove('hidden');
            setTimeout(() => b.classList.add('hidden'), 3000);
        }

        // RULE 3: Önce Auth, Sonra İşlem
        window.onload = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { console.error("Giriş hatası:", e); }

            onAuthStateChanged(auth, (u) => {
                user = u;
                const params = new URLSearchParams(window.location.search);
                currentEventId = params.get('event');
                if (currentEventId) loadEvent(); else showView('view-admin');
            });
        };

        async function loadEvent() {
            if (!user || !currentEventId) return;
            try {
                const d = await getDoc(doc(db, getEvPath(), currentEventId));
                if (d.exists()) {
                    document.getElementById('event-info').innerText = d.data().name;
                    document.getElementById('event-info').classList.remove('hidden');
                    switchTab('upload');
                } else {
                    showMsg("Oda bulunamadı.");
                    currentEventId = null;
                    showView('view-admin');
                }
            } catch (e) { console.error(e); }
        }

        window.showView = (id) => {
            ['view-admin', 'view-upload', 'view-gallery'].forEach(v => {
                const el = document.getElementById(v);
                if(el) el.classList.add('hidden');
            });
            const target = document.getElementById(id);
            if(target) target.classList.remove('hidden');
            
            if (!currentEventId && id !== 'view-admin') {
                if (id === 'view-upload') {
                    document.getElementById('upload-content').classList.add('hidden');
                    document.getElementById('no-event-error').classList.remove('hidden');
                }
            } else {
                if (id === 'view-upload') {
                    document.getElementById('upload-content').classList.remove('hidden');
                    document.getElementById('no-event-error').classList.add('hidden');
                }
            }
        };

        window.switchTab = (tab) => {
            const up = document.getElementById('nav-up');
            const gal = document.getElementById('nav-gal');
            if (tab === 'upload') {
                showView('view-upload');
                up.classList.replace('text-slate-400', 'text-indigo-600');
                gal.classList.replace('text-indigo-600', 'text-slate-400');
            } else {
                showView('view-gallery');
                gal.classList.replace('text-slate-400', 'text-indigo-600');
                up.classList.replace('text-indigo-600', 'text-slate-400');
                if (currentEventId) initGallery();
            }
        };

        window.createNewEvent = async () => {
            if (!user) return showMsg("Bağlanıyor...");
            const name = document.getElementById('event-name').value.trim();
            if (!name) return showMsg("İsim girin!");
            const btn = document.getElementById('create-btn');
            btn.innerHTML = `<span class="loader"></span>`;
            btn.disabled = true;

            try {
                const d = await addDoc(collection(db, getEvPath()), { 
                    name, 
                    createdAt: serverTimestamp(),
                    uid: user.uid 
                });
                currentEventId = d.id;
                
                // GitHub Pages ve Iframe/Blob URL'leri için güvenli URL yapısı
                const currentFullUrl = window.location.href.split('?')[0].split('#')[0];
                const finalUrl = currentFullUrl + "?event=" + currentEventId;
                
                document.getElementById('qr-event-title').innerText = name;
                document.getElementById('qr-container').innerHTML = "";
                
                // QRCode kütüphanesini tetikleme
                try {
                    new QRCode(document.getElementById("qr-container"), { 
                        text: finalUrl, 
                        width: 256, 
                        height: 256, 
                        colorDark: "#4f46e5", 
                        correctLevel: QRCode.CorrectLevel.H 
                    });
                } catch (qrErr) {
                    console.error("QR Hatası:", qrErr);
                    // Fallback: QRCode bazen kütüphane henüz hazır değilse hata verebilir
                    setTimeout(() => {
                        new QRCode(document.getElementById("qr-container"), { text: finalUrl, width: 256, height: 256, colorDark: "#4f46e5", correctLevel: QRCode.CorrectLevel.H });
                    }, 500);
                }
                
                document.getElementById('admin-inputs').classList.add('hidden');
                document.getElementById('qr-result-card').classList.remove('hidden');
                
                document.getElementById('view-gallery-btn').onclick = () => {
                    // Blob ortamlarında (Canvas) pushState çalışmadığı için sadece durumu güncelliyoruz
                    if (window.location.protocol !== 'blob:') {
                        try {
                            window.history.pushState({}, '', "?event=" + currentEventId);
                        } catch (e) { console.warn("Navigasyon kısıtlaması."); }
                    }
                    loadEvent(); 
                };
            } catch (e) { 
                console.error(e);
                showMsg("Hata oluştu."); 
            } finally { 
                btn.innerHTML = "Oluştur ve QR Üret"; 
                btn.disabled = false; 
            }
        };

        window.handleFileUpload = (input) => {
            if (!user || !currentEventId) return;
            const file = input.files[0];
            if (!file) return;

            const st = document.getElementById('upload-status');
            const bar = document.getElementById('p-bar');
            const pct = document.getElementById('pct');
            st.classList.remove('hidden');

            const sRef = ref(storage, `memori/${currentEventId}/${Date.now()}_${file.name.replace(/\s/g, '_')}`);
            const task = uploadBytesResumable(sRef, file);

            task.on('state_changed', 
                (s) => { 
                    const p = Math.round((s.bytesTransferred / s.totalBytes) * 100);
                    bar.style.width = p + "%"; pct.innerText = p + "%";
                },
                (err) => { 
                    console.error(err);
                    showMsg("Yükleme başarısız."); 
                    st.classList.add('hidden'); 
                },
                async () => {
                    const url = await getDownloadURL(task.snapshot.ref);
                    await addDoc(collection(db, getPhPath(currentEventId)), { url, createdAt: serverTimestamp(), uid: user.uid });
                    input.value = "";
                    setTimeout(() => { st.classList.add('hidden'); switchTab('gallery'); }, 500);
                }
            );
        };

        function initGallery() {
            if (unsub || !currentEventId) return;
            const g = document.getElementById('gallery-grid');
            const e = document.getElementById('empty-state');
            
            unsub = onSnapshot(collection(db, getPhPath(currentEventId)), (snap) => {
                g.innerHTML = "";
                if (snap.empty) {
                    e.classList.remove('hidden');
                } else {
                    e.classList.add('hidden');
                    const docs = snap.docs.map(d => d.data()).sort((a, b) => {
                        const dateA = a.createdAt?.seconds || 0;
                        const dateB = b.createdAt?.seconds || 0;
                        return dateB - dateA;
                    });
                    docs.forEach(data => {
                        const div = document.createElement('div');
                        div.className = "aspect-square rounded-2xl overflow-hidden bg-slate-200 border border-slate-100 shadow-sm";
                        div.innerHTML = `<img src="${data.url}" class="w-full h-full object-cover" loading="lazy">`;
                        g.appendChild(div);
                    });
                }
            }, (err) => {
                console.error("Galeri hatası:", err);
            });
        }
    </script>
</body>
</html>
